loop_dt: 0.001
default_controller: "mimic_hpny"

# 控制器切换期间插值用的 kp/kd（使用 AMP 配置）
switch_interpolation:
  # Roban2: 8个手臂关节（每边4个）- 来自 config_amp.yaml
  arm_kp: [20.0, 20.0, 20.0, 20.0, 20.0, 20.0, 20.0, 20.0]
  arm_kd: [3.0, 3.0, 3.0, 3.0, 3.0, 3.0, 3.0, 3.0]
  # Roban2: 1个腰部关节
  waist_kp: [4.0]
  waist_kd: [4.0]

controllers:
  - name: "amp"
    type: "GenericRLController"
    config: "controllers/config_amp.yaml"
    enabled: true

  # 贺年舞蹈
  - name: "mimic_hpny"
    type: "GenericRLController"
    config: "controllers/config_mimic_HPNY_dance.yaml"
    enabled: true

  # 查尔斯舞蹈
  # - name: "mimic_charleston"
  #   type: "GenericRLController"
  #   config: "controllers/config_mimic_charleston_dance.yaml"
  #   enabled: true

  # 后倒地起身（俯卧，面朝下）
  - name: "mimic_prone"
    type: "GenericRLController"
    config: "controllers/config_mimic_prone.yaml"
    enabled: true