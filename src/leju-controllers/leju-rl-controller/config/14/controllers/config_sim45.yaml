# =============================================================================
# SIM45 行走控制器
# =============================================================================

HumanoidRobotCfg:
  # ---------------------------------------------------------------------------
  # 推理引擎选择 (可选: openvino, onnxruntime)
  # ---------------------------------------------------------------------------
  inference_engine: "onnxruntime"

  # ---------------------------------------------------------------------------
  # 控制循环配置
  # ---------------------------------------------------------------------------
  loop_dt: 0.001                              # 控制循环周期 [s]，1000Hz
  policy_path: "../policy/amp/sim45_debug12_12091132_14900.onnx"

  env:
    # -------------------------------------------------------------------------
    # 策略推理配置
    # -------------------------------------------------------------------------
    policy_dt: 0.02                           # 策略推理周期 [s]，50Hz

    # -------------------------------------------------------------------------
    # 机器人关节配置
    # -------------------------------------------------------------------------
    robot:
      enable_arm_controller: true             # 是否启用独立的手臂控制器

      # 关节名称列表（必须与策略训练时的顺序一致）
      # 共 20 个关节：6*2 腿 + 4*2 臂
      # 注意：此策略不包含 waist_yaw 关节控制
      joint_names:
        ["leg_l1_joint", "leg_l2_joint", "leg_l3_joint", "leg_l4_joint", "leg_l5_joint", "leg_l6_joint",   # [0-5] 左腿
         "leg_r1_joint", "leg_r2_joint", "leg_r3_joint", "leg_r4_joint", "leg_r5_joint", "leg_r6_joint",   # [6-11] 右腿
         "zarm_l1_joint", "zarm_l2_joint", "zarm_l3_joint", "zarm_l4_joint",  # [12-15] 左臂
         "zarm_r1_joint", "zarm_r2_joint", "zarm_r3_joint", "zarm_r4_joint"]  # [16-19] 右臂

      # 关节方向乘数（用于适配不同的关节坐标系定义）
      joint_direction:
        [1.,1.,1.,1.,1.,1.,                   # 左腿
         1.,1.,1.,1.,1.,1.,                   # 右腿
         1.,1.,1.,1.,                         # 左臂
         1.,1.,1.,1.]                         # 右臂

      # 默认关节位置 [rad]（站立姿态）
      joint_default_pos:
        [-0.412, -0.0437, -0.287, 0.5, -0.2, 0.,   # 左腿
          0.412, 0.0437, 0.287, 0.5, -0.2, 0.,     # 右腿
          0.2, 0.16, -0.4, -0.5,               # 左臂
          0.2, -0.16, 0.4, -0.5]               # 右臂

      # 关节力矩限制 [Nm]
      joint_torque_limit:
        [48., 63., 48., 47., 20., 20.,        # 左腿
         48., 63., 48., 47., 20., 20.,        # 右腿
         20., 20., 20., 20.,                  # 左臂
         20., 20., 20., 20.]                  # 右臂

      # PD 控制器位置增益 Kp
      actuator_kp:
        [100., 100., 100., 150., 40., 40.,    # 左腿
         100., 100., 100., 150., 40., 40.,    # 右腿
         15., 15., 15., 15.,                  # 左臂
         15., 15., 15., 15.]                  # 右臂

      # PD 控制器速度增益 Kd
      actuator_kd:
        [2., 2., 2., 4., 4., 2.,              # 左腿
         2., 2., 2., 4., 4., 2.,              # 右腿
         3., 3., 3., 3.,                      # 左臂
         3., 3., 3., 3.]                      # 右臂

      # 控制模式: 0=CST(力矩), 1=CSV(速度), 2=CSP(位置)
      actuator_control_mode:
        [0, 0, 0, 0, 0, 0,                    # 左腿: 力矩模式
         0, 0, 0, 0, 0, 0,                    # 右腿: 力矩模式
         2, 2, 2, 2,                          # 左臂: 位置模式
         2, 2, 2, 2]                          # 右臂: 位置模式

      # 动作缩放因子（策略输出乘以此值得到关节位置偏移）
      action_scale:
        [0.25, 0.25, 0.25, 0.25, 0.25, 0.25, # 左腿
         0.25, 0.25, 0.25, 0.25, 0.25, 0.25, # 右腿
         0.25, 0.25, 0.25, 0.25,              # 左臂
         0.25, 0.25, 0.25, 0.25]              # 右臂

    # -------------------------------------------------------------------------
    # 观测配置
    # -------------------------------------------------------------------------
    observations:
      history_length: 1                       # 观测历史长度（1 = 不使用历史）
      stack_order: "classic"                  # 历史堆叠顺序: "classic" 或 "isaacLab"

      # 观测项配置
      terms:
        # ----- 传感器观测（从 IMU/编码器获取）-----
        base_ang_vel:                         # 基座角速度 (3维, rad/s)
          scale: 1.0
          clip: [-1000., 1000.]
        projected_gravity:                    # 重力在机体系的投影 (3维)
          scale: 1.0
          clip: [-1000., 1000.]
        # ----- 速度指令（外部输入控制）-----
        velocity_commands:                    # 目标速度指令 (3维: x, y, yaw)
          scale: 1.0
          clip: [-1000., 1000.]
        # ----- 关节状态观测 -----
        joint_pos:                            # 当前关节位置 - 默认位置 (20维, rad)
          scale: 1.0
          clip: [-1000., 1000.]
        joint_vel:                            # 当前关节速度 (20维, rad/s)
          scale: 1.0
          clip: [-1000., 1000.]
        actions:                              # 上一步的策略输出 (20维)
          scale: 1.0
          clip: [-1000., 1000.]

    # -------------------------------------------------------------------------
    # 速度缩放配置
    # -------------------------------------------------------------------------
    velocity_scale:
      linear_x: 0.83
      linear_x_negative_scale: 1.0
      linear_y: 0.166
      angular_z: 0.498
