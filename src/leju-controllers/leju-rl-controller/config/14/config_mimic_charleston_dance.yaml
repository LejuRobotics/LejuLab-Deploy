# =============================================================================
# GenericRLController 配置文件 - Mimic (动作模仿) 模式
# =============================================================================
# 此配置用于 Roban14 机器人的动作模仿控制器
# 控制器会跟踪 CSV 文件中的参考动作，使用 RL 策略生成平滑的关节命令
# =============================================================================

HumanoidRobotCfg:
  # ---------------------------------------------------------------------------
  # 推理引擎选择 (可选: openvino, onnxruntime)
  # ---------------------------------------------------------------------------
  inference_engine: "onnxruntime"

  # ---------------------------------------------------------------------------
  # 控制循环配置
  # ---------------------------------------------------------------------------
  loop_dt: 0.001                              # 控制循环周期 [s]，1000Hz
  # policy_path: "policy/2025-12-24_15-03-24.onnx"  # ONNX 策略模型路径（相对于此配置文件）
  policy_path: "policy/2025-12-26_17-22-41.onnx"

  motion_data_path: "motion_data/charleston_dance.csv"
  # ---------------------------------------------------------------------------
  # Motion 数据配置
  # ---------------------------------------------------------------------------
  # CSV 格式固定为: body_pos(3) + body_quat(4) + joint_pos(N) + joint_vel(N)
  # MotionLoader 自动解析，无需手动配置字段
  motion:
    default_motion: "charleston_dance"             # 默认动作名称（启动时加载）
    motions:                                  # 命名的动作数据文件
      - name: "charleston_dance"                   # 动作名称
        # file: "motion_data/charleston_dance_old.csv"   # 查尔斯舞蹈，手臂初始张开
        file: "motion_data/charleston_dance.csv"   # 查尔斯舞蹈

  env:
    # -------------------------------------------------------------------------
    # 策略推理配置
    # -------------------------------------------------------------------------
    policy_dt: 0.02                           # 策略推理周期 [s]，50Hz

    # -------------------------------------------------------------------------
    # 机器人关节配置
    # -------------------------------------------------------------------------
    robot:
      residual_action: true                   # 是否使用残差动作（action + motion_target）

      # 关节名称列表（必须与策略训练时的顺序一致）
      # 共 21 个关节：1 腰 + 6*2 腿 + 4*2 臂
      joint_names:
        ["waist_yaw_joint",                   # [0] 腰部偏航
         "leg_l1_joint", "leg_l2_joint", "leg_l3_joint", "leg_l4_joint", "leg_l5_joint", "leg_l6_joint",   # [1-6] 左腿
         "leg_r1_joint", "leg_r2_joint", "leg_r3_joint", "leg_r4_joint", "leg_r5_joint", "leg_r6_joint",   # [7-12] 右腿
         "zarm_l1_joint", "zarm_l2_joint", "zarm_l3_joint", "zarm_l4_joint",  # [13-16] 左臂
         "zarm_r1_joint", "zarm_r2_joint", "zarm_r3_joint", "zarm_r4_joint"]  # [17-20] 右臂

      # notes: index=0即waist_yaw_joint的方向这里默认设置为-1，是因为:
      # - 训练的模型模型中base和当前实物的可能存在差异
      # - 如何确定此处的方向值:以躯干为base,如果腰部的旋转方向是符合右手定则，那么此处设置为-1，否则为1
      joint_direction:
        [-1.,                                 # 腰部
         1.,1.,1.,1.,1.,1.,                   # 左腿
         1.,1.,1.,1.,1.,1.,                   # 右腿
         1.,1.,1.,1.,                         # 左臂
         1.,1.,1.,1.]                         # 右臂

      # 默认关节位置 [rad]（站立姿态）
      joint_default_pos:
        [0.,                                  # 腰部
         -0.412, -0.0437, -0.287, 0.5, -0.2, 0.,   # 左腿: hip_yaw, hip_roll, hip_pitch, knee, ankle_pitch, ankle_roll
         0.412, 0.0437, 0.287, 0.5, -0.2, 0.,     # 右腿
         0.2, 0.16, -0.4, -0.5,               # 左臂: shoulder_pitch, shoulder_roll, elbow, wrist
         0.2, -0.16, 0.4, -0.5]               # 右臂

      # 关节力矩限制 [Nm]
      joint_torque_limit:
        [80.,                                 # 腰部
         80., 63., 80., 63., 25., 25.,        # 左腿（髋/膝关节80/63Nm，踝关节25Nm）
         80., 63., 80., 63., 25., 25.,        # 右腿
         25., 25., 25., 25.,                  # 左臂
         25., 25., 25., 25.]                  # 右臂

      # PD 控制器位置增益 Kp
      actuator_kp:
        [40.179,                              # 腰部
         40.179, 99.098, 40.179, 99.098, 14.250, 14.250,  # 左腿
         40.179, 99.098, 40.179, 99.098, 14.250, 14.250,  # 右腿
         14.25, 14.25, 14.25, 14.25,          # 左臂
         14.25, 14.25, 14.25, 14.25]          # 右臂

      # PD 控制器速度增益 Kd
      actuator_kd:
        [2.557,                               # 腰部
         2.557, 6.3088, 2.557, 6.3088, 0.9072, 0.9072,  # 左腿
         2.557, 6.3088, 2.557, 6.3088, 0.9072, 0.9072,  # 右腿
         0.9072, 0.9072, 0.9072, 0.9072,     # 左臂
         0.9072, 0.9072, 0.9072, 0.9072]     # 右臂

      # 控制模式: 0=CST(力矩), 1=CSV(速度), 2=CSP(位置)
      actuator_control_mode:
        [0,                                   # 腰部: 力矩模式
         0, 0, 0, 0, 0, 0,                    # 左腿: 力矩模式
         0, 0, 0, 0, 0, 0,                    # 右腿: 力矩模式
         2, 2, 2, 2,                          # 左臂: 位置模式
         2, 2, 2, 2]                          # 右臂: 位置模式

      # 动作缩放因子（策略输出乘以此值得到关节位置偏移）
      action_scale:
        [0.4977,                              # 腰部
         0.4977, 0.1589, 0.4977, 0.1589, 0.4385, 0.4385,  # 左腿
         0.4977, 0.1589, 0.4977, 0.1589, 0.4385, 0.4385,  # 右腿
         0.4385, 0.4385, 0.4385, 0.4385,     # 左臂
         0.4385, 0.4385, 0.4385, 0.4385]     # 右臂

    # -------------------------------------------------------------------------
    # 观测配置
    # -------------------------------------------------------------------------
    observations:
      history_length: 1                       # 观测历史长度（1 = 不使用历史）
      stack_order: "classic"                  # 历史堆叠顺序: "classic" 或 "isaaclab"

      # 观测项配置
      # 每个观测项包含: scale(缩放), clip(裁剪范围), 可选 motion_fields/slice
      terms:
        # ----- Motion 相关观测（从 CSV 获取）-----
        motion_command:                       # 目标关节位置和速度 (42维)
          scale: 1.
          clip: [-5000., 5000.]
        motion_target_height:                 # 目标身体高度 (1维)
          scale: 1.
          clip: [-5000., 5000.]
        motion_anchor_ori_b:                  # 目标姿态相对旋转矩阵 (6维)
          scale: 1.
          clip: [-5000., 5000.]
        # ----- 传感器观测（从 IMU/编码器获取）-----
        projected_gravity:                    # 重力在机体系的投影 (3维)
          scale: 1.
          clip: [-5000., 5000.]
        base_ang_vel:                         # 基座角速度 (3维, rad/s)
          scale: 1.
          clip: [-5000., 5000.]
        joint_pos:                            # 当前关节位置 - 默认位置 (21维, rad)
          scale: 1.
          clip: [-5000., 5000.]
        joint_vel:                            # 当前关节速度 (21维, rad/s)
          scale: 1.
          clip: [-5000., 5000.]
        actions:                              # 上一步的策略输出 (21维)
          scale: 1.
          clip: [-5000., 5000.]
