loop_dt: 0.001
default_controller: "mimic_dance"

# 控制器切换配置
switch_interpolation:
  duration: 2.0    #策略切换时间

controllers:
  - name: "amp"
    type: "GenericRLController"
    config: "controllers/config_amp.yaml"
    enabled: true

  - name: "mimic_dance"
    type: "GenericRLController"
    config: "controllers/config_mimic_dance.yaml"
    enabled: true

  - name: "mimic_qqxinjiang"
    type: "GenericRLController"
    config: "controllers/config_mimic_qqxinjiang.yaml"
    enabled: true

  - name: "mimic_balei"
    type: "GenericRLController"
    config: "controllers/config_mimic_balei.yaml"
    enabled: true

  # 如果使用开原仓库Lejurobot_lab训练amp
  - name: "amp_os"
    type: "GenericRLController"
    config: "controllers/config_amp_os.yaml"
    enabled: true

