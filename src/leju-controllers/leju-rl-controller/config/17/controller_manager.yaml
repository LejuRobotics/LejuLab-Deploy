loop_dt: 0.001
default_controller: "mimic_dance"

# 控制器切换期间插值用的 kp/kd（确保能跟踪到位）
switch_interpolation:
  arm_kp: [20.0, 20.0, 20.0, 20.0, 20.0, 20.0, 20.0, 20.0]
  arm_kd: [3.0, 3.0, 3.0, 3.0, 3.0, 3.0, 3.0, 3.0]
  # 17版本: 1个腰部关节
  waist_kp: [40.179]
  waist_kd: [2.557]

controllers:
  - name: "mimic_dance"
    type: "GenericRLController"
    config: "config_mimic_dance.yaml"
    enabled: true
