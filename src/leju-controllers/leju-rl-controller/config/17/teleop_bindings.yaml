# Teleop Bindings Configuration for Robot Version 17
# 格式：使用 buttons + action 嵌套结构

# ============================================================================
# 速度配置
# ============================================================================
velocity_limits:
  stick_deadzone: 0.05
  linear_x: 0.6
  linear_y: 0.60
  angular_z: 1.00

# ============================================================================
# Joy 手柄绑定
# ============================================================================
joy_bindings:

  # 注意：START 和 BACK（quit）是系统内置的生命周期控制，不需要在配置中定义
  #
  # 可用按键列表：A, B, X, Y, LB, RB, L3, R3, GUIDE, MISC
  #
  # 手臂模式切换配置说明：
  #   如需配置手臂模式切换，请在 joy_bindings 下添加：
  #
  #   - buttons: ["LB", "X"]
  #     action:
  #       type: SetArmMode
  #       args:
  #         name: keep_pose
  #
  #   支持的手臂模式：
  #     - keep_pose: 保持当前手臂姿态
  #     - auto:      自动控制模式（跟随行走策略）
  #     - external:  外部控制模式（接受 VR/SDK 指令）

  # -------------------------------------------------------------------------
  # 控制器动作绑定
  # -------------------------------------------------------------------------
  - buttons: ["X"]
    action:
      type: SwitchController
      args:
        name: amp
  - buttons: ["Y"]
    action:
      type: SwitchController
      args:
        name: mimic_dance

  # -------------------------------------------------------------------------
  # Motion 播放触发
  # -------------------------------------------------------------------------
  - buttons: ["A"]
    action:
      type: MotionCommand
      args:
        op: Start
        # name: "dance_1" # 可选，指定动作名称

  # -------------------------------------------------------------------------
  # cmd_stance 手动切换（B 键：0=行走 ↔ 1=站立）
  # 注意：A 键已被 MotionCommand:Start 占用，改用 B 键
  # -------------------------------------------------------------------------
  - buttons: ["B"]
    action:
      type: ToggleCmdStance

# ============================================================================
# Quest VR 控制器绑定
# ============================================================================
quest_bindings:

  # 可用按键列表：LEFT_TRIGGER, RIGHT_TRIGGER, LEFT_GRIP, RIGHT_GRIP,
  #               LEFT_FIRST, LEFT_SECOND, RIGHT_FIRST, RIGHT_SECOND
  #
  # 手臂模式切换配置示例：
  #   - buttons: ["LEFT_TRIGGER", "RIGHT_FIRST"]
  #     action:
  #       type: SetArmMode
  #       args:
  #         name: keep_pose

  # -------------------------------------------------------------------------
  # cmd_stance 手动切换（B 键：0=行走/下蹲 ↔ 1=站立/俯仰）
  # 与 Joy 手柄 B 键行为一致；B = 右手次按钮(right_second / RIGHT_SECOND)
  # -------------------------------------------------------------------------
  - buttons: ["RIGHT_SECOND"]
    action:
      type: ToggleCmdStance
