# DDS Recorder Configuration Example
# Copy this file and modify as needed

# DDS Configuration
dds:
  domain_id: 0
  discovery_timeout: 10.0  # seconds

  # Topic filtering (regex supported when use_regex: true, empty = record all)
  use_regex: true
  topics:
    - "/rt/imu_state"
    - "/rt/joint_state"
    - "/rt/joint_cmd"
    - "/rt/joy"
    - "/rt/hardware/state"
    - "/rt/hardware/stop"
    # VR 外部控制指令
    - "/rt/arm_trajectory"
    - "/rt/head_trajectory"
    - "/rt/waist_trajectory"
    - "/rt/cmd_vel"
    # VR RPC 服务 (Request/Reply)
    - "rq/ControllerService/.*/Request"
    - "rr/ControllerService/.*/Reply"
    # Quest VR 遥操作
    - "/rt/quest/bone_poses"
    - "/rt/quest/joysticks"
    # 控制器观测数据（匹配所有控制器名称）
    - "/.*/obs/.*"
    - "/.*/observations"
    - "/.*/q_target"
    - "/.*/motion_frame"
    # 部位控制器模式
    - "/.*/arm_mode"
    - "/.*/waist_mode"

# Output Configuration
output:
  directory: "~/.ros/lejulab/mcap" # Output directory (empty = cwd)
  prefix: "recording"          # File name prefix
  append_date: true       # Append date-time to filename
  max_file_size: 500      # MB, 0 = unlimited (kuavo default: 500)
  max_duration: 0           # seconds, 0 = unlimited
  split: true               # Enable file splitting on size/duration limit
  max_splits: 8             # Max split files to keep (0 = unlimited)
  min_space: 1024           # MB, minimum free disk space to continue recording
  buffer_size: 1            # MB

  compression:
    enabled: true
    type: "zstd"          # zstd, lz4, or none
    level: 3              # 1-19 for zstd, 1-12 for lz4

# Timing Configuration
timing:
  use_sim_time: false
  start_immediately: true
  # start_trigger_topic: "/start_recording"

# Logging Configuration
logging:
  level: "info"           # trace, debug, info, warning, error, critical
  console: true
  file_enabled: false
  file_path: "recorder.log"
